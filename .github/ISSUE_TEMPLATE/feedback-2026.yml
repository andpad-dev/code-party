name: Feedback 2026
description: Feedback for code party at RubyKaigi 2026
title: "[RubyKaigi 2026]: Code party feedback"
body:
  - type: markdown
    attributes:
      value: |
        アンドパッド ([@andpad_dev](https://x.com/andpad_dev)) は X (旧 Twitter) で技術情報や採用情報などを発信しています。 ぜひフォローください!

        ANDPAD ([@andpad_dev](https://x.com/andpad_dev)) shares technical information, job openings, and more on X (formerly Twitter). Please be sure to follow them!
  - type: textarea
    id: fun
    attributes:
      label: 楽しかったですか？ / Did you have fun?
      description: |
        楽しかった場合はどういう部分が楽しかったかも教えてください。（例：Ruby書くことそのものが楽しかった、●●のgemの作者とお話できたから、など）

        If you had fun, what kind of part was fun?（e.g. Because I was able to talk with the author of ●●gem, Ruby it was fun to write, etc.）
    validations:
      required: true
  - type: textarea
    id: groups
    attributes:
      label: どのグループに参加しましたか？ / Which groups did you join?
    validations:
      required: true
  - type: textarea
    id: etc
    attributes:
      label: なにか思ったことがあれば自由に書いてください。 / Please give us any feedback.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        宣伝：今日はご参加ありがとうございました！ 明日の Day3 もアンドパッドブースは元気にやっております。 ランチとドリンクも用意してるから、ぜひ遊びに来てね！

        Ad: Thanks for coming tonight! Don't forget, the ANDPAD booth will be back in action for Day 3. We've got lunch and drinks waiting for you, so make sure to swing by and say hi!
