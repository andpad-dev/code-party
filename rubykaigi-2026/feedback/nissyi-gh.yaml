# ANDPAD (andpad_dev) shares technical information, job openings, and more on X (formerly Twitter). Please be sure to follow them!
questions:
  fun:
    # 楽しかったですか？
    # Did you have fun?
    # 楽しかった場合はどういう部分が楽しかったかも教えてください。（例：Ruby書くことそのものが楽しかった、●●のgemの作者とお話できたから、など）
    # If you had fun, what kind of part was fun?（e.g. Because I was able to talk with the author of ●●gem, Ruby it was fun to write, etc.）
    |
    この機会を通じて、初めて ruby/rubygemsをforkしたり、gemのコードを追ってみたり、修正のPRを出したりできたことが楽しかったです！
    
    また、最初に何をやるか迷っていたときに、よさげなissueを見つけたものの、着手すべきかどうかを迷っていました。そのとき、hsbtさんに直接相談できる機会をもらえた上に、実装のアドバイスまでもらえて何をやるか決められました。とても嬉しかったです。
  groups:
    # どのグループに参加しましたか？
    # Which groups did you join?
    - RubyGems/Bundler by hsbt
  etc:
    # なにか思ったことがあれば自由に書いてください。
    # Please give us any feedback.
    |
    これからbundler/gemコマンドで何か気づいたことがあればissueを立てたりPRを送ったりできそうです！楽しい時間をありがとうございました。
    
    また、お弁当がとても美味しかったです🙌
